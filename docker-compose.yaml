version: "3.8"

services:
  # Local PostgreSQL container (used for local development when needed)
  postgres:
    image: postgres:13  # Use the specified PostgreSQL image
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-refactor}  # PostgreSQL user provided via environment variable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}  # PostgreSQL password provided via environment variable
      POSTGRES_DB: ${POSTGRES_DB:-refactor_platform}  # PostgreSQL database name provided via environment variable
    ports:
      - "${POSTGRES_PORT:-5432}:5432"  # Expose PostgreSQL on the configured or default port
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist PostgreSQL data in a volume
    networks:
      - backend_network  # Connect to the backend network for local communication

  # Rust application that connects to either local or remote PostgreSQL based on environment configuration
  rust-app:
    build: .  # Build the Rust app from the current directory
    container_name: rust-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-refactor}  # PostgreSQL user provided via environment variable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}  # PostgreSQL password provided via environment variable
      POSTGRES_DB: ${POSTGRES_DB:-refactor_platform}  # PostgreSQL database name provided via environment variable
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-public}  # PostgreSQL schema provided via environment variable
      POSTGRES_HOST: postgres  # Hostname for PostgreSQL: either 'postgres' (for local) or a remote hostname
      DATABASE_URL: postgres://${POSTGRES_USER:-refactor}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-refactor_platform}  # Full database URL
      WEB_PORT: ${WEB_PORT:-4000}  # Configurable web port
      SERVICE_PORT: ${SERVICE_PORT:-4001}  # Configurable service port
      ENTITY_API_PORT: ${ENTITY_API_PORT:-4002}  # Configurable entity API port
    ports:
      - "${WEB_PORT:-4000}:4000"  # Expose the web api port on the container to the same port on the host, default to 4000
      - "${SERVICE_PORT:-4001}:4001"  # Expose the service port on the container to the same port on the host, default to 4001
      - "${ENTITY_API_PORT:-4002}:4002"  # Expose the entity API port on the container to the same port on the host, default to 4002
    depends_on:
      - postgres  # Ensure the PostgreSQL service starts first (if running locally)
    networks:
      - backend_network  # Connect to the backend network (optional if PostgreSQL is remote)

networks:
  backend_network:
    driver: bridge  # type of network driver for services to communicate

volumes:
  postgres_data:  # named volume for persisting PostgreSQL data on the host
